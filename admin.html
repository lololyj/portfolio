<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin — Yoonjae Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TLKDW2K60K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-TLKDW2K60K');
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #C8FF00;
      --bg: #080808;
      --surface: #0f0f0f;
      --surface-2: #161616;
      --text: #f0f0f0;
      --muted: #666;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --danger: #ff4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; border: none; }
    input, textarea, select { font-family: 'Inter', sans-serif; }

    /* ─── Lock screen ─── */
    #lockScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; z-index: 9999;
    }
    #lockScreen h1 { font-family: 'Syne', sans-serif; font-size: 40px; color: var(--accent); font-weight: 800; }
    #lockScreen p { color: var(--muted); font-size: 14px; }
    .lock-form { display: flex; gap: 12px; margin-top: 8px; }
    .lock-input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 14px 20px; border-radius: var(--radius-sm);
      font-size: 16px; outline: none; width: 200px; letter-spacing: 4px;
      transition: border-color 0.3s;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-btn {
      background: var(--accent); color: #080808; font-weight: 700;
      padding: 14px 28px; border-radius: var(--radius-sm); font-size: 14px;
      transition: opacity 0.3s;
    }
    .lock-btn:hover { opacity: 0.85; }
    .lock-error { color: var(--danger); font-size: 13px; height: 20px; }

    /* ─── Admin Layout ─── */
    #adminApp { display: none; min-height: 100vh; }
    .admin-nav {
      position: sticky; top: 0; background: rgba(8,8,8,0.9);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      padding: 16px 40px; display: flex; align-items: center;
      justify-content: space-between; z-index: 100;
    }
    .admin-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
    .admin-nav-right { display: flex; align-items: center; gap: 16px; }
    .btn-back { font-size: 13px; color: var(--muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 100px; transition: color 0.3s, border-color 0.3s; }
    .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-logout { font-size: 13px; color: var(--danger); border: 1px solid rgba(255,68,68,0.2); padding: 8px 16px; border-radius: 100px; background: rgba(255,68,68,0.06); transition: background 0.3s; }
    .btn-logout:hover { background: rgba(255,68,68,0.12); }
    .btn-export { font-size: 13px; color: #080808; background: var(--accent); border: none; padding: 8px 16px; border-radius: 100px; font-weight: 700; transition: opacity 0.3s; }
    .btn-export:hover { opacity: 0.85; }

    .admin-main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 61px); }

    /* ─── Sidebar ─── */
    .admin-sidebar {
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto; max-height: calc(100vh - 61px);
      position: sticky; top: 61px;
    }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .sidebar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
    .btn-new {
      background: var(--accent); color: #080808; font-weight: 700;
      font-size: 12px; padding: 8px 16px; border-radius: 100px; transition: opacity 0.3s;
    }
    .btn-new:hover { opacity: 0.85; }
    .proj-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 18px;
      cursor: pointer; transition: border-color 0.3s, background 0.3s;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .proj-item:hover { border-color: rgba(200,255,0,0.2); background: var(--surface-2); }
    .proj-item.active { border-color: var(--accent); background: rgba(200,255,0,0.04); }
    .proj-item-info { flex: 1; min-width: 0; }
    .proj-item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-item-year { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .proj-item-del {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid transparent;
      color: var(--muted); font-size: 16px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: color 0.3s, border-color 0.3s, background 0.3s;
    }
    .proj-item-del:hover { color: var(--danger); border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.08); }
    .no-projects { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* ─── Editor ─── */
    .admin-editor {
      padding: 40px 48px;
      overflow-y: auto;
      max-height: calc(100vh - 61px);
    }
    .editor-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 16px; color: var(--muted); text-align: center; padding: 60px;
    }
    .editor-empty-icon { font-size: 48px; margin-bottom: 8px; }
    .editor-empty h3 { font-family: 'Syne', sans-serif; font-size: 22px; color: var(--text); }
    .editor-empty p { font-size: 14px; line-height: 1.6; max-width: 320px; }

    .editor-form { display: flex; flex-direction: column; gap: 32px; }
    .form-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .form-section-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .form-section-header h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
    .form-section-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .form-fields { padding: 28px 24px; display: flex; flex-direction: column; gap: 22px; background: var(--surface-2); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .field input, .field textarea, .field select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: var(--radius-sm);
      font-size: 14px; outline: none; transition: border-color 0.3s, background 0.3s;
      resize: vertical;
    }
    .field input::placeholder, .field textarea::placeholder { color: #3a3a3a; }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: rgba(200,255,0,0.5);
      background: rgba(200,255,0,0.02);
    }
    .field select option { background: #1a1a1a; }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Color picker row */
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .color-field { display: flex; flex-direction: column; gap: 8px; }
    .color-field label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .color-input-wrap { display: flex; gap: 10px; align-items: center; }
    .color-input-wrap input[type="color"] {
      width: 48px; height: 42px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      padding: 4px; cursor: pointer;
    }
    .color-input-wrap input[type="text"] {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 13px; outline: none; font-family: monospace;
    }

    /* Image upload */
    .img-upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 40px 24px; text-align: center; cursor: pointer;
      transition: border-color 0.3s, background 0.3s; position: relative;
    }
    .img-upload-zone:hover, .img-upload-zone.drag-over {
      border-color: var(--accent); background: rgba(200,255,0,0.02);
    }
    .img-upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      padding: 0; border: none; background: none;
    }
    .upload-icon { font-size: 32px; margin-bottom: 12px; color: var(--muted); }
    .upload-text { font-size: 14px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .upload-hint { font-size: 12px; color: #444; }
    .thumb-preview {
      position: relative; display: inline-block; margin-top: 16px;
    }
    .thumb-preview img {
      max-width: 240px; max-height: 160px; object-fit: cover;
      border-radius: var(--radius-sm); border: 1px solid var(--border); display: block;
    }
    .thumb-remove {
      position: absolute; top: -8px; right: -8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--danger); color: white; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 0.3s;
    }
    .thumb-remove:hover { opacity: 0.8; }

    /* Slides grid */
    .slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .slide-thumb {
      position: relative; border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid var(--border); aspect-ratio: 4/3;
    }
    .slide-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide-thumb .slide-num {
      position: absolute; top: 6px; left: 8px;
      font-size: 11px; font-weight: 700; color: white;
      background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 100px;
    }
    .slide-thumb .slide-del {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--danger); color: white; font-size: 13px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      opacity: 0; transition: opacity 0.2s;
    }
    .slide-thumb:hover .slide-del { opacity: 1; }
    .slides-add-btn {
      aspect-ratio: 4/3; border: 2px dashed var(--border);
      border-radius: var(--radius-sm); display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer; gap: 6px;
      color: var(--muted); font-size: 13px; position: relative;
      transition: border-color 0.3s, color 0.3s;
    }
    .slides-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .slides-add-btn input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      padding: 0; border: none; background: none;
    }
    .slides-add-icon { font-size: 28px; }

    /* Actions */
    .editor-actions {
      display: flex; gap: 14px; padding-top: 8px;
      align-items: center; flex-wrap: wrap;
    }
    .btn-save {
      background: var(--accent); color: #080808; font-weight: 700;
      font-size: 14px; padding: 14px 32px; border-radius: 100px;
      transition: opacity 0.3s, box-shadow 0.3s;
    }
    .btn-save:hover { opacity: 0.9; box-shadow: 0 0 40px rgba(200,255,0,0.3); }
    .btn-delete {
      background: rgba(255,68,68,0.08); color: var(--danger);
      border: 1px solid rgba(255,68,68,0.2); font-weight: 600;
      font-size: 14px; padding: 14px 28px; border-radius: 100px;
      transition: background 0.3s;
    }
    .btn-delete:hover { background: rgba(255,68,68,0.15); }
    .save-status { font-size: 13px; color: var(--muted); }

    /* Toast */
    #adminToast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a1a1a; border: 1px solid rgba(200,255,0,0.3);
      color: var(--text); font-size: 14px; font-weight: 500;
      padding: 14px 32px; border-radius: 100px; z-index: 9500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s, transform 0.35s; white-space: nowrap;
    }
    #adminToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .admin-main { grid-template-columns: 1fr; }
      .admin-sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
      .admin-editor { max-height: none; }
    }
  </style>
</head>
<body>

<!-- Lock screen -->
<div id="lockScreen">
  <h1>Admin Panel</h1>
  <p>포트폴리오 관리 페이지입니다. 비밀번호를 입력해주세요.</p>
  <div class="lock-form">
    <input type="password" id="lockInput" class="lock-input" placeholder="••••••" maxlength="20" />
    <button class="lock-btn" onclick="tryUnlock()">Enter</button>
  </div>
  <div class="lock-error" id="lockError"></div>
  <p style="margin-top:24px;font-size:12px;color:#333;">기본 비밀번호: 100533</p>
</div>

<!-- Admin App -->
<div id="adminApp">
  <nav class="admin-nav">
    <span class="admin-logo">YL Admin</span>
    <div class="admin-nav-right">
      <button class="btn-export" onclick="exportJSON()">⬇ Vercel 배포용 내보내기</button>
      <a href="index.html" class="btn-back">← 포트폴리오 보기</a>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="admin-main">
    <!-- Sidebar: project list -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Projects</span>
        <button class="btn-new" onclick="newProject()">+ New</button>
      </div>
      <div id="sidebarList"></div>
    </aside>

    <!-- Editor -->
    <main class="admin-editor" id="adminEditor">
      <div class="editor-empty">
        <div class="editor-empty-icon">📂</div>
        <h3>프로젝트를 선택하세요</h3>
        <p>왼쪽에서 프로젝트를 선택하거나 "+ New"를 눌러 새 프로젝트를 만드세요.</p>
      </div>
    </main>
  </div>
</div>

<div id="adminToast"></div>

<script>
/* ── Auth ── */
const ADMIN_PW = '100533';
const UNLOCK_KEY = 'portfolio_admin_v1';
const STORAGE_KEY = 'portfolio_projects_v1';

function tryUnlock() {
  const val = document.getElementById('lockInput').value;
  if (val === ADMIN_PW) {
    sessionStorage.setItem(UNLOCK_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('lockError').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('lockInput').value = '';
  }
}
function logout() {
  sessionStorage.removeItem(UNLOCK_KEY);
  location.reload();
}
async function exportJSON() {
  try {
    const projects = await idbGetAll();
    if (!projects || projects.length === 0) {
      showToast('내보낼 프로젝트가 없습니다.');
      return;
    }
    const json = JSON.stringify(projects, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'projects.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('projects.json 다운로드 완료! 프로젝트 루트에 넣고 Vercel에 배포하세요.');
  } catch (err) {
    showToast('내보내기 실패: ' + err.message);
  }
}
document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});
if (sessionStorage.getItem(UNLOCK_KEY)) {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  setTimeout(initAdmin, 0);
}

/* ── IndexedDB ── */
const IDB_NAME = 'yj-portfolio';
const IDB_STORE = 'projects';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAll() {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(item) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(item);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
async function idbDelete(id) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

/* ── Data ── */
let projects = [];
let currentId = null;

/* ── Admin Init ── */
async function initAdmin() {
  try {
    projects = await idbGetAll();
  } catch { projects = []; }
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (projects.length === 0) {
    list.innerHTML = '<div class="no-projects">프로젝트가 없습니다.<br/>+ New를 눌러 추가하세요.</div>';
    return;
  }
  list.innerHTML = projects.map(p => `
    <div class="proj-item ${p.id === currentId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <div class="proj-item-info">
        <div class="proj-item-title">${p.title || '제목 없음'}</div>
        <div class="proj-item-year">${p.year || ''}</div>
      </div>
      <button class="proj-item-del" onclick="event.stopPropagation();deleteProject('${p.id}')">×</button>
    </div>
  `).join('');
}

function selectProject(id) {
  currentId = id;
  renderSidebar();
  const proj = projects.find(p => p.id === id);
  if (proj) renderEditor(proj);
}

async function newProject() {
  const id = 'proj-' + Date.now();
  const proj = {
    id, title: '', year: new Date().getFullYear().toString(),
    role: '', tools: '', tags: [], summary: '',
    accent: '#7c3aed', accent2: '#06b6d4',
    thumbnail: null, slides: []
  };
  projects.push(proj);
  await idbPut(proj);
  selectProject(id);
}

async function deleteProject(id) {
  if (!confirm('이 프로젝트를 삭제하시겠습니까?')) return;
  projects = projects.filter(p => p.id !== id);
  await idbDelete(id);
  if (currentId === id) {
    currentId = null;
    document.getElementById('adminEditor').innerHTML = `
      <div class="editor-empty">
        <div class="editor-empty-icon">📂</div>
        <h3>프로젝트를 선택하세요</h3>
        <p>왼쪽에서 프로젝트를 선택하거나 "+ New"를 눌러 새 프로젝트를 만드세요.</p>
      </div>`;
  }
  renderSidebar();
  showToast('삭제됐습니다.');
}

/* ── Editor Render ── */
function renderEditor(proj) {
  const editor = document.getElementById('adminEditor');
  const tagsVal = (proj.tags || []).join(', ');

  editor.innerHTML = `
    <form class="editor-form" onsubmit="saveProject(event)">
      <!-- Basic Info -->
      <div class="form-section">
        <div class="form-section-header">
          <h3>기본 정보</h3>
          <p>프로젝트 제목, 연도, 역할, 도구, 태그를 입력하세요.</p>
        </div>
        <div class="form-fields">
          <div class="field">
            <label>프로젝트 제목 *</label>
            <input type="text" id="f-title" value="${esc(proj.title)}" placeholder="예: 스마트 장바구니 UX 개선" required>
          </div>
          <div class="form-row-2">
            <div class="field">
              <label>연도</label>
              <input type="text" id="f-year" value="${esc(proj.year)}" placeholder="2025">
            </div>
            <div class="field">
              <label>역할</label>
              <input type="text" id="f-role" value="${esc(proj.role)}" placeholder="UX Research / UI Design">
            </div>
          </div>
          <div class="field">
            <label>사용 도구</label>
            <input type="text" id="f-tools" value="${esc(proj.tools)}" placeholder="Figma, FigJam, Notion">
          </div>
          <div class="field">
            <label>태그 (쉼표로 구분)</label>
            <input type="text" id="f-tags" value="${esc(tagsVal)}" placeholder="UX, UI, Prototype">
            <span class="field-hint">예: UX, UI, Prototype, Design System</span>
          </div>
          <div class="field">
            <label>프로젝트 설명</label>
            <textarea id="f-summary" rows="4" placeholder="프로젝트 목표와 접근 방식을 간단히 설명해주세요.">${esc(proj.summary)}</textarea>
          </div>
        </div>
      </div>

      <!-- Colors -->
      <div class="form-section">
        <div class="form-section-header">
          <h3>카드 색상</h3>
          <p>썸네일 없을 때 표시되는 그라디언트 색상입니다.</p>
        </div>
        <div class="form-fields">
          <div class="color-row">
            <div class="color-field">
              <label>Accent Color 1</label>
              <div class="color-input-wrap">
                <input type="color" id="f-accent-picker" value="${proj.accent || '#7c3aed'}"
                  oninput="document.getElementById('f-accent').value=this.value">
                <input type="text" id="f-accent" value="${esc(proj.accent || '#7c3aed')}"
                  oninput="document.getElementById('f-accent-picker').value=this.value" maxlength="7">
              </div>
            </div>
            <div class="color-field">
              <label>Accent Color 2</label>
              <div class="color-input-wrap">
                <input type="color" id="f-accent2-picker" value="${proj.accent2 || '#06b6d4'}"
                  oninput="document.getElementById('f-accent2').value=this.value">
                <input type="text" id="f-accent2" value="${esc(proj.accent2 || '#06b6d4')}"
                  oninput="document.getElementById('f-accent2-picker').value=this.value" maxlength="7">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Thumbnail -->
      <div class="form-section">
        <div class="form-section-header">
          <h3>썸네일 이미지</h3>
          <p>프로젝트 카드와 모달 상단에 표시되는 대표 이미지입니다. (권장: 800×600px)</p>
        </div>
        <div class="form-fields">
          <div id="thumbSection">
            ${proj.thumbnail
              ? `<div class="thumb-preview">
                   <img src="${proj.thumbnail}" alt="thumbnail">
                   <button type="button" class="thumb-remove" onclick="removeThumbnail()">×</button>
                 </div>`
              : `<div class="img-upload-zone" id="thumbZone">
                   <input type="file" accept="image/png,image/jpeg,image/webp,image/gif"
                     onchange="uploadThumbnail(this.files[0])">
                   <div class="upload-icon">🖼️</div>
                   <div class="upload-text">클릭하거나 이미지를 드래그하세요</div>
                   <div class="upload-hint">PNG, JPG, WebP — 최대 5MB 권장</div>
                 </div>`}
          </div>
        </div>
      </div>

      <!-- Slides -->
      <div class="form-section">
        <div class="form-section-header">
          <h3>장표 슬라이드</h3>
          <p>프로젝트 상세 모달에서 순서대로 표시됩니다. PNG 이미지를 여러 장 업로드하세요.</p>
        </div>
        <div class="form-fields">
          <div class="slides-grid" id="slidesGrid">
            ${renderSlidesGrid(proj.slides || [])}
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="editor-actions">
        <button type="submit" class="btn-save">저장하기</button>
        <button type="button" class="btn-delete" onclick="deleteProject('${proj.id}')">프로젝트 삭제</button>
        <span class="save-status" id="saveStatus"></span>
      </div>
    </form>`;
}

function renderSlidesGrid(slides) {
  let html = slides.map((s, i) => `
    <div class="slide-thumb">
      <img src="${s}" alt="Slide ${i+1}" loading="lazy">
      <span class="slide-num">${i+1}</span>
      <button type="button" class="slide-del" onclick="removeSlide(${i})">×</button>
    </div>`).join('');
  html += `
    <label class="slides-add-btn">
      <input type="file" accept="image/png,image/jpeg,image/webp" multiple onchange="addSlides(this.files)">
      <span class="slides-add-icon">+</span>
      <span>슬라이드 추가</span>
    </label>`;
  return html;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Thumbnail ── */
function uploadThumbnail(file) {
  if (!file) return;
  compressImage(file).then(b64 => {
    const proj = projects.find(p => p.id === currentId);
    if (!proj) return;
    proj.thumbnail = b64;
    document.getElementById('thumbSection').innerHTML = `
      <div class="thumb-preview">
        <img src="${b64}" alt="thumbnail">
        <button type="button" class="thumb-remove" onclick="removeThumbnail()">×</button>
      </div>`;
    showToast('썸네일 업로드 완료');
  });
}
function removeThumbnail() {
  const proj = projects.find(p => p.id === currentId);
  if (proj) proj.thumbnail = null;
  document.getElementById('thumbSection').innerHTML = `
    <div class="img-upload-zone" id="thumbZone">
      <input type="file" accept="image/png,image/jpeg,image/webp,image/gif"
        onchange="uploadThumbnail(this.files[0])">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">클릭하거나 이미지를 드래그하세요</div>
      <div class="upload-hint">PNG, JPG, WebP — 최대 5MB 권장</div>
    </div>`;
}

/* ── Slides ── */
function addSlides(files) {
  const proj = projects.find(p => p.id === currentId);
  if (!proj) return;
  const arr = Array.from(files);
  let done = 0;
  arr.forEach(file => {
    compressImage(file).then(b64 => {
      proj.slides.push(b64);
      done++;
      if (done === arr.length) {
        document.getElementById('slidesGrid').innerHTML = renderSlidesGrid(proj.slides);
        showToast(`슬라이드 ${arr.length}장 추가됨`);
      }
    });
  });
}
function removeSlide(idx) {
  const proj = projects.find(p => p.id === currentId);
  if (!proj) return;
  proj.slides.splice(idx, 1);
  document.getElementById('slidesGrid').innerHTML = renderSlidesGrid(proj.slides);
  showToast('슬라이드 삭제됨');
}

/* ── Image Compression ── */
function compressImage(file) {
  // 압축 없이 원본 그대로 base64로 읽기
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

/* ── Save ── */
async function saveProject(e) {
  e.preventDefault();
  const proj = projects.find(p => p.id === currentId);
  if (!proj) return;

  proj.title   = document.getElementById('f-title').value.trim();
  proj.year    = document.getElementById('f-year').value.trim();
  proj.role    = document.getElementById('f-role').value.trim();
  proj.tools   = document.getElementById('f-tools').value.trim();
  proj.tags    = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  proj.summary = document.getElementById('f-summary').value.trim();
  proj.accent  = document.getElementById('f-accent').value.trim() || '#7c3aed';
  proj.accent2 = document.getElementById('f-accent2').value.trim() || '#06b6d4';

  try {
    await idbPut(proj);
    renderSidebar();
    const status = document.getElementById('saveStatus');
    status.textContent = '✓ 저장됐습니다';
    showToast('저장됐습니다!');
    setTimeout(() => { if(status) status.textContent = ''; }, 3000);
  } catch(err) {
    showToast('저장 실패: ' + err.message);
  }
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('adminToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
